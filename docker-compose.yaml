version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cp-postgres
    environment:
      POSTGRES_DB: sb3_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sb3_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  java-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: java-backend
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sb3_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - GIGACHAT_AUTHORIZATION_KEY=N2Q3ZGNmMGUtMGU4OC00MTE5LWE3ZGYtMTVjMTNlYmU4MTZmOjcyNWEyZjc1LTE1NDctNGY2My1iNjQ5LTkzZTM2MWNmNDc1ZQ==
      # Добавляем Java опции для сертификатов
      - JAVA_OPTS=-Djavax.net.ssl.trustStore=/app/certs/cacerts.jks -Djavax.net.ssl.trustStorePassword=changeit
    volumes:
      # Монтируем папку с сертификатами
      - ./certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - java-app
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pg_data:
    name: cp-postgres-data