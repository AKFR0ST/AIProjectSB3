databaseChangeLog:

  # =========================
  # categories
  # =========================
  - changeSet:
      id: create-categories
      author: dev
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: code
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  # =========================
  # skills
  # =========================
  - changeSet:
      id: create-skills
      author: dev
      changes:
        - createTable:
            tableName: skills
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: code
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: max_score
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_skills_category
                    references: categories(id)

  # =========================
  # grids (замер ABLLS)
  # =========================
  - changeSet:
      id: create-grids
      author: dev
      changes:
        - createTable:
            tableName: grids
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: child_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: tutor_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  # =========================
  # skill_scores
  # =========================
  - changeSet:
      id: create-skill-scores
      author: dev
      changes:
        - createTable:
            tableName: skill_scores
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: grid_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_scores_grid
                    references: grids(id)

              - column:
                  name: skill_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_scores_skill
                    references: skills(id)

              - column:
                  name: score
                  type: INT
                  constraints:
                    nullable: false